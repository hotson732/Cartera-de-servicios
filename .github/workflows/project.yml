name: Auto Project Flow

on:
  issues:
    types: [opened, closed, reopened]
  pull_request:
    types: [opened, closed]

jobs:
  move-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Move issue based on status
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;

            const state = issue.state;

            if (state === "open") {
              console.log("Issue abierta -> Backlog");
            }

            if (state === "closed") {
              console.log("Issue cerrada -> Done");
            }
